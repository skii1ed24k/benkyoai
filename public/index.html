<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>勉強AIアシスタント</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <div class="container">
    <h1>勉強AIアシスタント</h1>
    <p>教科書の写真をアップロードすると、AIが問題を作成し、理解レベルを評価します。</p>

    <label class="file-label">
      画像を選択
      <input type="file" id="imageInput" accept="image/*" />
    </label>
    <button id="analyzeBtn" disabled>問題を作成する</button>

    <section class="result" id="resultSection" hidden>
      <h2>認識結果</h2>
      <details>
        <summary>抽出されたテキストを表示</summary>
        <pre id="extractedText"></pre>
      </details>
    </section>

    <section class="quiz-section" id="quizSection" hidden>
      <div id="quizContainer"></div>
      <div class="button-group" id="quizButtonGroup" hidden>
        <button id="retryBtn" class="retry-btn">再々挑戦</button>
        <button id="loadPhotoBtn" class="load-photo-btn">別の写真を読み込む</button>
      </div>
    </section>

    <section class="advice-section" id="adviceSection" hidden>
      <h2>📚 学習アドバイス</h2>
      <div id="adviceContainer"></div>
      <div class="button-group" id="adviceButtonGroup">
        <button id="retryQuizBtn" class="retry-quiz-btn">クイズに再挑戦</button>
        <button id="newPhotoBtn" class="new-photo-btn">別の写真を読み込む</button>
      </div>
    </section>

    <div class="note">
      <p>OpenAI APIキーを設定すると、より自然な問題と理解レベル評価ができます。</p>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4.0.4/dist/tesseract.min.js"></script>
  <script src="/app.js"></script>
</body>
</html>
