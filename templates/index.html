<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>勉強AIアシスタント</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <div class="container">
    <h1>勉強AIアシスタント</h1>
    <p>複数の教科書画像をアップロードすると、AIがまとめて問題を作成し、理解レベルを評価します。</p>

    <label class="file-label">
      画像を選択（複数可）
      <input type="file" id="imageInput" accept="image/*" multiple />
    </label>
    <div id="fileInfo" class="file-info">選択された画像はありません。</div>
    <div id="ocrStatus" class="file-info"></div>
    <button id="analyzeBtn" disabled>問題を作成する</button>

    <section class="result" id="resultSection" hidden>
      <h2>認識結果</h2>
      <pre id="extractedText"></pre>
      <h2>AIの出力</h2>
      <div id="aiResultContainer">
        <pre id="aiResult"></pre>
        <div id="quizContainer"></div>
      </div>
    </section>

    <div class="note">
      <p>OpenAI APIキーを設定すると、より自然な問題と理解レベル評価ができます。</p>
      <p>OCRはブラウザで実行されます。Vercel上でもサーバー側のtesseract依存を回避できます。</p>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@2/dist/tesseract.min.js"></script>
  <script src="/static/app.js"></script>
</body>
</html>
